name: build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Start Application
        run: |
          docker run -d --rm -p 5173:5173 hexletprojects/qa_auto_java_testing_kanban_board_project_ru_app
          # Wait for the app to be ready
          timeout 60s bash -c 'until curl -s http://localhost:5173 > /dev/null; do sleep 1; done'
      - name: Build with Gradle
        run: make build
      - name: Static Analysis
        run: make lint
      - name: Run SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar
